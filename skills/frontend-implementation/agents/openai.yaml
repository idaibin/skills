interface:
  display_name: "Frontend Implementation"
  short_description: "Implement lean frontend UI while preserving contracts"
  default_prompt: "Use $frontend-implementation to implement or review frontend UI, routes, forms, tables, dashboards, responsive behavior, DOM/CSS structure, layout ownership, scroll boundaries, or architecture while preserving the existing stack, design system, state, API contracts, and verification flow. Keep DOM and CSS minimal: avoid unnecessary wrappers, animation-only containers, repeated declarations, competing overflow/inset/height rules, stale overrides, restated defaults, and arbitrary pixel utilities like h-[22px] for routine sizing; use semantic HTML, existing components, project scale utilities, named layout owners, cascade, and inheritance when safe."
