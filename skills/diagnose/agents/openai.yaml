interface:
  display_name: "Diagnose"
  short_description: "Diagnose root causes without unauthorized fixes"
  default_prompt: "Use $diagnose to reproduce, isolate, and confirm bugs, failing tests, build failures, regressions, flakes, or performance problems. Select Diagnosis-only by default for explain, why, root-cause, or before-changing-code requests; keep tracked files, index, checkout, and refs unchanged, and report the recommended fix. Require separate authorization and isolation for bisect or checkout/ref mutation. Enter Diagnose-and-fix only when the user explicitly requests a fix, then rerun the original feedback loop and clean temporary artifacts."
