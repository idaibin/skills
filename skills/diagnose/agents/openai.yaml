interface:
  display_name: "Diagnose"
  short_description: "Confirm root causes before implementation"
  default_prompt: "Use $diagnose to reproduce the exact symptom, classify the failure, build a red/green loop, minimize variables when needed, test falsifiable hypotheses one at a time, and confirm the root cause or exact Not verified gap. Keep tracked files, index, checkout, and refs unchanged. When the user also requests a fix, finish diagnosis first and hand the confirmed cause, owner, regression seam, original loop, constraints, and validation to the matching implementation skill; do not apply the permanent fix inside $diagnose. Route local diff readiness to $repo-review and Git mutation to $repo-delivery."
