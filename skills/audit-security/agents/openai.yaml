interface:
  display_name: "Security Audit"
  short_description: "Audit scoped security with framework-aware evidence"
  default_prompt: "Use $audit-security for a lightweight evidence-grounded audit of a known code, API, browser, native IPC, file, config, dependency, or release surface, including a read-only specialist delegated by $repo-review. In specialist mode inspect only the delegated paths or diff and return findings/gaps without dirty-tree, final-review, edit, or Git ownership. Map contracts, assets, trust boundaries, roles, and attacker inputs; select only applicable Web/API, Rust/Axum, Vue, Tauri IPC, or SQLite/File profiles. Report scoped evidence and Not verified gaps, never a blanket secure claim. Repository mapping belongs to $repo-map and Git mutation belongs to $repo-delivery."
