interface:
  display_name: "Frontend Implementation"
  short_description: "Implement React or Vue UI while preserving contracts"
  default_prompt: "Use $implement-frontend for frontend UI changes. Detect the framework and preserve native ownership. For React use hooks, effects, and render boundaries. For Vue Composition use ref/reactive/computed, explicit watch or bounded watchEffect, composables, cleanup, and cancellation. For Vue Options preserve data/computed/watch, dynamic watchers, methods, provide/inject, component guards, and native lifecycle without Composition helpers. Preserve Pinia, Router, component, keep-alive, API, and state contracts. Search existing routes, components, hooks/composables, services, and stores first; reuse or adapt before creating. Keep lean DOM/CSS and explicit layout ownership; route systematic read-only audits to $audit-frontend."
