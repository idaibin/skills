interface:
  display_name: "Ops Browser"
  short_description: "Collect browser evidence without disturbing user state"
  default_prompt: "Use $ops-browser to inspect, verify, screenshot, debug, or operate browser pages. Choose the path first: Playwright for repo-startable local projects without manual login or with credentials; Codex in-app Browser for Codex-owned or user-completed login sessions; user default browser/CDP/remote APIs for named pages, uploads, downloads, or existing account state. Enumerate surfaces and tabs first; use target-scoped APIs when available; use Computer Use only for UI fallback and report focus impact. Use $frontend-implementation for code changes."
