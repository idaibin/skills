interface:
  display_name: "Ops Browser"
  short_description: "Collect browser evidence without disturbing user state"
  default_prompt: "Use $ops-browser to inspect, verify, screenshot, debug, or operate browser pages. Prefer the requested or recorded session browser, then the browser with required session evidence, then the user's default browser such as Arc; enumerate surfaces and tabs first; use Codex Remote or the Chrome plugin for browser/tab state and target-scoped APIs when available; use Computer Use only for UI steps not exposed through browser APIs and report focus impact; ask before Chrome/Chromium fallback; reuse safe tabs or sessions; preserve user state. Use $frontend-implementation for code changes."
