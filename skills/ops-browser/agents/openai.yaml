interface:
  display_name: "Ops Browser"
  short_description: "Perform capability-aware low-level browser operations"
  default_prompt: "Use $ops-browser to inspect, verify, screenshot, debug, or operate browser pages. Run a capability preflight before navigation or claims; enumerate sessions/tabs only when exposed, choose temporary paths valid for the active environment, revalidate target identity before actions, match evidence type to each claim, and stop before unauthorized account or irreversible changes. When called by $chatgpt-review-bridge, perform only its routed low-level browser actions and leave package, send authorization, rounds, attribution, and response archiving to the bridge."
