interface:
  display_name: "Ops Browser"
  short_description: "Collect browser evidence without disturbing user state"
  default_prompt: "Use $ops-browser to inspect, verify, screenshot, debug, or operate browser pages. Choose the workflow first: local project automation for repo-startable apps with no manual login or available credentials; managed browser session for agent-owned or user-completed login state; user browser session for named pages, uploads, downloads, or existing profile/account state. Enumerate sessions and tabs before opening anything; reuse the same tab/session; revalidate target tab identity before actions; report upload temp paths and cleanup. Use $frontend-implementation for code changes."
