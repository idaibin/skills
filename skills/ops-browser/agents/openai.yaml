interface:
  display_name: "Ops Browser"
  short_description: "Collect browser evidence without disturbing user state"
  default_prompt: "Use $ops-browser to inspect, verify, screenshot, debug, or operate browser pages. Prefer the user's default or authenticated browser, enumerate surfaces and tabs first, reuse safe matching tabs or recorded sessions, use Playwright for repeatable repo/CI automation, avoid extra browser surfaces, and preserve user state. Use $frontend-implementation for code changes."
