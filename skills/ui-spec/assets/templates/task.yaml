version: 1
revision: 1
visual_source:
  id: selected-source-id
  revision: selected-source-revision
  status: accepted
  source: local-path-or-product-design-result
  rights_status: approved-for-project-use
  use:
    - visual-hierarchy
    - layout-direction
  ignore:
    - unverified-product-behavior
    - inferred-exact-token-values
task:
  id: surface-specification
  project: project-name
  surface: route-or-window
  goal: Specify the selected UI direction for implementation.
scope:
  include:
    - target-ui-surface
  exclude:
    - backend-contract-changes
facts:
  available:
    - repository-confirmed-capabilities
  unavailable:
    - invented-capabilities
references: []
required_states:
  - loading
  - empty
  - error
  - populated
validation:
  target_sizes:
    - 1440x900
  deterministic:
    - repository-build
    - no-material-overflow
    - no-console-errors
acceptance: []
budget:
  max_revision_rounds: 3
  max_duration_minutes: 40
  max_artifact_storage_mb: 200
recovery:
  preserve_last_accepted_revision: true
  allow_resume: true
  allow_rollback: true
