interface:
  display_name: "Code Context"
  short_description: "Map bounded repository context and reuse candidates"
  default_prompt: "Use $code-context only when the user requests a separate repository-grounding, reuse-inventory, bootstrap, or docs/code-alignment deliverable. Select Quick Grounding, Targeted Inventory, Alignment, or Bootstrap; read only paths that answer named context questions, escalate scope only when a discovered boundary materially affects the task, and stop once evidence is sufficient. Report real commands, project class, reuse/reference candidates, stop reason, and Not found or Not verified gaps without implementing changes."
